<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — ตรวจสอบใบเบิกอะไหล่</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="login-section">
  <div class="login-box">
    <div class="app-header">
      <img src="sunjupiter-logo.png" alt="Sun Jupiter Logo" class="login-logo">
      <h1>ตรวจสอบใบเบิกอะไหล่</h1>
    </div>
    <div class="login-form">
      <label for="password-input">รหัสผ่าน</label>
      <div class="password-wrap">
        <input type="password" id="password-input" placeholder="กรอกรหัสผ่าน" autocomplete="current-password">
        <button type="button" id="btn-toggle-pw" tabindex="-1">👁</button>
      </div>
      <button id="btn-login" type="button">เข้าใช้งาน</button>
      <div id="login-error" class="error-box" hidden>รหัสผ่านไม่ถูกต้อง</div>
    </div>
  </div>
</div>

<script>
  const passwordInput = document.getElementById('password-input');
  const loginError    = document.getElementById('login-error');

  function doLogin() {
    if (passwordInput.value === 'amp20000') {
      sessionStorage.setItem('auth', '1');
      window.location.href = 'app.html';
    } else {
      loginError.hidden = false;
      passwordInput.value = '';
      passwordInput.focus();
    }
  }

  document.getElementById('btn-login').addEventListener('click', doLogin);
  passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  document.getElementById('btn-toggle-pw').addEventListener('click', () => {
    const isHidden = passwordInput.type === 'password';
    passwordInput.type = isHidden ? 'text' : 'password';
    document.getElementById('btn-toggle-pw').textContent = isHidden ? '🙈' : '👁';
  });
</script>
</body>
</html>
